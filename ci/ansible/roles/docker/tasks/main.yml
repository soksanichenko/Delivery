---
- name: Install docker and docker-compose
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-compose
  become: true

- name: Create docker settings directory
  ansible.builtin.file:
    name: "/etc/docker"
    mode: '0700'
    owner: root
    group: root
    state: directory
  become: true

- name: Prepare docker daemon.json file
  ansible.builtin.template:
    src: daemon.json.j2
    dest: "/etc/docker/daemon.json"
    owner: root
    group: root
    mode: '0600'
    force: true
  notify: Restart docker
  become: true

- name: Start docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    daemon_reload: true
    state: started
  become: true
...
