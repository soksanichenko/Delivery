---
- name: Prepare backend env files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ config_root }}/{{ item.dest }}"
    owner: root
    group: root
    mode: '0600'
    force: "{{ item.force }}"
  loop:
    - {dest: '{{ const_env_file }}', force: false, src: 'const.env.j2'}
    - {dest: '{{ env_file }}', force: true, src: 'env.j2'}
  vars:
    postgresql_pass: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
  become: true
...
